<!DOCTYPE html>

<html>
  <head>
    <title>Super Cool Gravity Sim!!!</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <p id="explanation">
      <i>Controls - </i>
      <ul>
        <li>W / A / S / D - Up / Left / Down / Right</li>
        <li>Q / E - Zoom Out / In</li>
        <li>Z / C - Slow Down / Speed Up</li>
        <li>C - Hide Coordinates</li>
      </ul>
      <i>Go To - </i>Click on the body's displayed coordinates
      <i>Follow - </i>Click on the body itself
    </p>
    <script type="module" src="script.js"></script>
  </body>
</html>
